name: CI
on:
  push:
    branches: [master, development, testing]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run pytest tests/ --cov=feature_flags --cov-report=term-missing --cov-fail-under=100
      - run: uv run ruff check .
      - run: uv run ruff format --check .
